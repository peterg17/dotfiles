- defaults:
    link:
      relink: true

- create:
    - ~/.ssh/config.d

- link:
    ~/.zshrc: .zshrc
    ~/.doom.d: .doom.d
    ~/.fzf.bash: .fzf.bash
    ~/.fzf.zsh: .fzf.zsh
    ~/.config/nvim: nvim
    ~/.gitconfig: .gitconfig
    ~/.ssh/config.d/00-generic: ssh/00-generic
    ~/.claude/settings.json: claude/settings.json
