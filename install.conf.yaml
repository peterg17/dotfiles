- defaults:
    link:
      relink: true

- create:
    - ~/.ssh/config.d

- link:
    ~/.zshrc: .zshrc
    ~/.doom.d: .doom.d
    ~/.fzf.bash: .fzf.bash
    ~/.fzf.zsh: .fzf.zsh
    ~/.config/nvim: nvim
    ~/.ssh/config.d/00-generic: ssh/00-generic
    ~/.gitconfig:
      path: .gitconfig
      force: false
    ~/.tmux.conf: .tmux.conf

- shell:
    - command: "[ -L ~/.gitconfig ] || grep -qF 'path = ~/dotfiles/.gitconfig' ~/.gitconfig || printf '\\n[include]\\n\\tpath = ~/dotfiles/.gitconfig\\n' >> ~/.gitconfig"
      description: Inject dotfiles gitconfig include (skipped if already a symlink)
    - command: "git config --local user.email 'petergriggs17@gmail.com' && git config --local user.name 'Peter Griggs'"
      description: Pin personal email for the dotfiles repo (overrides any global/local config)
