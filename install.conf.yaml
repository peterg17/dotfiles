- defaults:
    link:
      relink: true

- create:
    - ~/.ssh/config.d
    - ~/.config
    - ~/.claude/skills
    - ~/.agents/skills
    - ~/.pi/agent/skills
    - ~/.pi/agent/agents
    - ~/.pi/agent/prompts
    - ~/.pi/agent/extensions
    - ~/.pi/agent/extensions/subagent
    - ~/.pi/agent/extensions/obsidian-tickets
    - ~/.pi/agent/skills/jira-ticket-workflow
    - ~/.pi/agent/skills/jira-team-ticket
    - ~/.pi/agent/skills/obsidian-ticket-team

- clean: ['~/.claude/skills']

- link:
    ~/.zshrc:
      path: .zshrc
      force: true
    ~/.doom.d: .doom.d
    ~/.fzf.bash: .fzf.bash
    ~/.fzf.zsh: .fzf.zsh
    ~/.config/nvim: nvim
    ~/.ssh/config.d/00-generic: ssh/00-generic

    ~/.claude/skills/parallel-jira-tickets: claude/skills/parallel-jira-tickets
    ~/.claude/skills/single-jira-ticket-team: claude/skills/single-jira-ticket-team
    ~/.claude/skills/obsidian-ticket-claude-team: claude/skills/obsidian-ticket-claude-team
    ~/.claude/skills/obsidian-ticket-create: claude/skills/obsidian-ticket-create
    ~/.claude/skills/obsidian-ticket-list: claude/skills/obsidian-ticket-list
    ~/.claude/skills/obsidian-ticket-update: claude/skills/obsidian-ticket-update
    ~/.claude/skills/obsidian-ticket-rebuild: claude/skills/obsidian-ticket-rebuild
    ~/.claude/skills/obsidian-ticket-kanban-rebuild: claude/skills/obsidian-ticket-kanban-rebuild
    ~/.claude/skills/obsidian-inbox-cleanup: agents/skills/obsidian-inbox-cleanup
    ~/.agents/skills/obsidian-inbox-cleanup: agents/skills/obsidian-inbox-cleanup
    ~/.pi/agent/skills/jira-ticket-workflow/SKILL.md: pi/skills/jira-ticket-workflow/SKILL.md
    ~/.pi/agent/skills/jira-team-ticket/SKILL.md: pi/skills/jira-team-ticket/SKILL.md
    ~/.pi/agent/skills/obsidian-ticket-team/SKILL.md:
      path: pi/skills/obsidian-ticket-team/SKILL.md
      force: true

    ~/.pi/agent/extensions/subagent/index.ts: pi/extensions/subagent/index.ts
    ~/.pi/agent/extensions/subagent/agents.ts: pi/extensions/subagent/agents.ts
    ~/.pi/agent/extensions/obsidian-tickets/index.ts:
      path: pi/extensions/obsidian-tickets/index.ts
      force: true

    ~/.pi/agent/agents/ticket-jira-analyst.md: pi/agents/ticket-jira-analyst.md
    ~/.pi/agent/agents/ticket-scout.md: pi/agents/ticket-scout.md
    ~/.pi/agent/agents/ticket-planner.md: pi/agents/ticket-planner.md
    ~/.pi/agent/agents/ticket-implementer.md: pi/agents/ticket-implementer.md
    ~/.pi/agent/agents/ticket-reviewer.md: pi/agents/ticket-reviewer.md
    ~/.pi/agent/agents/ticket-tester.md: pi/agents/ticket-tester.md
    ~/.pi/agent/agents/ticket-validator.md: pi/agents/ticket-validator.md

    ~/.pi/agent/prompts/ticket.md: pi/prompts/ticket.md
    ~/.pi/agent/prompts/tickets.md: pi/prompts/tickets.md
    ~/.pi/agent/prompts/plan-ticket.md: pi/prompts/plan-ticket.md
    ~/.pi/agent/prompts/review-ticket.md: pi/prompts/review-ticket.md

    ~/.tmux.conf:
      path: tmux/.tmux.conf
      force: true
    ~/.tmux.conf.local:
      path: tmux/.tmux.conf.local
      force: true

- shell:
    - command: "if [ -L ~/.gitconfig ]; then ln -sf \"$PWD/.gitconfig\" ~/.gitconfig; elif [ -e ~/.gitconfig ]; then grep -qF \"path = $PWD/.gitconfig\" ~/.gitconfig || printf '\\n[include]\\n\\tpath = %s/.gitconfig\\n' \"$PWD\" >> ~/.gitconfig; else ln -sf \"$PWD/.gitconfig\" ~/.gitconfig; fi"
      description: Symlink .gitconfig on fresh install, inject include if file already exists
    - command: "python3 \"$PWD/claude/merge-settings.py\" \"$PWD/claude/settings.json\""
      description: Merge public Claude settings into ~/.claude/settings.json (bootstraps on fresh install, preserves extra keys like DD plugins on re-install)
    - command: "python3 \"$PWD/pi/merge-settings.py\" \"$PWD/pi/settings.json\""
      description: Merge public pi settings into ~/.pi/agent/settings.json (preserves state pi writes itself, e.g. lastChangelogVersion)
    - command: "legacy=\"$HOME/.pi/agent/skills/obsidian-inbox-cleanup\"; expected=\"$PWD/agents/skills/obsidian-inbox-cleanup\"; if [ -L \"$legacy\" ] && [ \"$(readlink \"$legacy\")\" = \"$expected\" ]; then rm \"$legacy\"; echo \"Removed legacy pi-local shared skill symlink: $legacy\"; fi"
      description: Remove legacy pi-local shared skill symlink; pi discovers shared skills from ~/.agents/skills
    - command: "git config --local user.email 'petergriggs17@gmail.com' && git config --local user.name 'Peter Griggs'"
      description: Pin personal email for the dotfiles repo (overrides any global/local config)
    - command: "git config --global core.editor \"nvr -cc split --remote-wait +'set bufhidden=delete'\""
      description: Set nvr as global git editor
