- defaults:
    link:
      relink: true

- create:
    - ~/.ssh/config.d

- link:
    ~/.zshrc:
      path: .zshrc
      force: true
    ~/.doom.d: .doom.d
    ~/.fzf.bash: .fzf.bash
    ~/.fzf.zsh: .fzf.zsh
    ~/.config/nvim: nvim
    ~/.ssh/config.d/00-generic: ssh/00-generic

    ~/.tmux.conf.local: .tmux.conf.local

- shell:
    - command: "[ -e ~/.gitconfig ] && { [ -L ~/.gitconfig ] || grep -qF 'path = ~/dotfiles/.gitconfig' ~/.gitconfig || printf '\\n[include]\\n\\tpath = ~/dotfiles/.gitconfig\\n' >> ~/.gitconfig; } || ln -sf ~/dotfiles/.gitconfig ~/.gitconfig"
      description: Symlink .gitconfig on fresh install, inject include if file already exists
    - command: "python3 ~/dotfiles/claude/merge-settings.py ~/dotfiles/claude/settings.json"
      description: Merge public Claude settings into ~/.claude/settings.json (bootstraps on fresh install, preserves extra keys like DD plugins on re-install)
    - command: "git config --local user.email 'petergriggs17@gmail.com' && git config --local user.name 'Peter Griggs'"
      description: Pin personal email for the dotfiles repo (overrides any global/local config)
    - command: "git config --global core.editor \"nvr -cc split --remote-wait +'set bufhidden=delete'\""
      description: Set nvr as global git editor
    - command: "touch ~/.tmux.conf && grep -qF 'source-file ~/.tmux.conf.local' ~/.tmux.conf || printf '\\nsource-file ~/.tmux.conf.local\\n' >> ~/.tmux.conf"
      description: Inject tmux.conf.local source (skipped if already present)
